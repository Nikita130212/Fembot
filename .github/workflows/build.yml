name: Build Geode Mod

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Geode SDK
        run: |
          # Скачиваем Geode SDK через GitHub API
          $sdkUrl = "https://github.com/geode-sdk/sdk/releases/latest/download/geode-sdk-windows.zip"
          Invoke-WebRequest -Uri $sdkUrl -OutFile "sdk.zip" -UseBasicParsing
          Expand-Archive -Path "sdk.zip" -DestinationPath "C:\geode-sdk" -Force
          echo "C:\geode-sdk" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "C:\geode-sdk\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Build
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A Win32 -DGEODE_SDK_PATH="C:\geode-sdk"
          cmake --build . --config Release
        shell: cmd

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Fembot-Mod
          path: build/Release/*.geode