name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "main"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        run: |
          Invoke-WebRequest -Uri "https://github.com/ninja-build/ninja/releases/download/v1.12.1/ninja-win.zip" -OutFile "ninja.zip"
          Expand-Archive -Path "ninja.zip" -DestinationPath "C:\ninja"
          echo "C:\ninja" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        id: build
        with:
          sdk: 'latest'

      - name: Upload the built mod
        uses: actions/upload-artifact@v4
        with:
          name: Fembot-Mod
          path: ${{ steps.build.outputs.build-output }}