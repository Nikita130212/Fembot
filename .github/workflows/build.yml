name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "main"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Geode Mod
        uses: geode-sdk/build-geode-mod@main
        id: build
        with:
          sdk: 'latest'
          # Явно указываем использовать MSVC вместо Ninja
          generator: 'Visual Studio 17 2022'
          # Отключаем автоматическую установку Ninja
          install-ninja: false

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Fembot-Mod
          path: ${{ steps.build.outputs.build-output }}